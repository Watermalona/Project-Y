<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小朋友落樓梯 網頁版</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin-top: 20px;
        }
        canvas {
            background-color: #000;
            border: 4px solid #fff;
            display: block;
            margin: 20px auto;
        }
        p { font-size: 18px; }
    </style>
</head>
<body>

    <h1>小朋友落樓梯 (極簡版)</h1>
    <p>操控方法：用鍵盤 ⬅️ ➡️ 箭頭左右移動</p>
    <h2 id="score-text">層數: 0</h2>
    
    <!-- 遊戲畫面畫布 -->
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 1. 玩家設定
        let player = {
            x: 200, y: 100,
            width: 20, height: 20,
            vx: 0, vy: 0,
            speed: 4,
            gravity: 0.3,
            onPlatform: false
        };

        // 2. 樓梯（平台）設定
        let platforms = [];
        let platformSpeed = 1.5; // 樓梯向上升嘅速度
        let score = 0;
        let gameOver = false;

        // 鍵盤狀態監聽
        let keys = { Left: false, Right: false };
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft") keys.Left = true;
            if (e.key === "ArrowRight") keys.Right = true;
        });
        window.addEventListener("keyup", e => {
            if (e.key === "ArrowLeft") keys.Left = false;
            if (e.key === "ArrowRight") keys.Right = false;
        });

        // 初始化第一批樓梯
        function initPlatforms() {
            platforms = [];
            // 先喺玩家腳下生成一塊安全平台
            platforms.push({ x: 150, y: 200, width: 100, height: 15 });
            
            // 隨機生成其餘平台
            for (let i = 1; i < 6; i++) {
                generatePlatform(i * 90 + 100);
            }
        }

        function generatePlatform(yPosition) {
            let width = 80;
            let x = Math.random() * (canvas.width - width);
            platforms.push({ x: x, y: yPosition, width: width, height: 15 });
        }

        // 3. 核心遊戲引擎（每秒行 60 次）
        function update() {
            if (gameOver) return;

            // 左右移動操控
            if (keys.Left) player.vx = -player.speed;
            else if (keys.Right) player.vx = player.speed;
            else player.vx = 0;

            // 應用重力
            player.vy += player.gravity;

            // 更新玩家位置
            player.x += player.vx;
            player.y += player.vy;

            // 防止玩家走出左右邊界
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // 樓梯向上移動
            player.onPlatform = false;
            platforms.forEach((plat, index) => {
                plat.y -= platformSpeed;

                // 碰撞檢測：檢查玩家有冇踩到樓梯
                if (player.x + player.width > plat.x && 
                    player.x < plat.platX || player.x < plat.x + plat.width) {
                    // 檢查玩家對腳係咪踩落樓梯頂表面
                    if (player.y + player.height >= plat.y && 
                        player.y + player.height - player.vy <= plat.y + 6) {
                        player.y = plat.y - player.height;
                        player.vy = -platformSpeed; // 跟隨樓梯一齊上升
                        player.onPlatform = true;
                    }
                }

                // 如果樓梯升出咗頂部，就喺底部重新生成一條新樓梯
                if (plat.y + plat.height < 0) {
                    platforms.splice(index, 1);
                    generatePlatform(canvas.height);
                    score++; // 成功執到一條新樓梯就加分（代表落得越深）
                    document.getElementById("score-text").innerText = "層數: " + score;
                }
            });

            // 4. 輸贏判定
            // 頂部針刺（觸頂慘死）
            if (player.y <= 0) {
                endGame("你被夾死咗喇！");
            }
            // 跌落深淵（跌死）
            if (player.y > canvas.height) {
                endGame("你跌死咗喇！");
            }

            draw();
            requestAnimationFrame(update);
        }

        // 5. 繪圖功能
        function draw() {
            // 清空舊畫面
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 畫天花板嘅針刺提示（極簡化成一條紅線）
            ctx.fillStyle = "red";
            ctx.fillRect(0, 0, canvas.width, 10);

            // 畫玩家（藍色正方形）
            ctx.fillStyle = "#00bcff";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 畫樓梯平台（綠色長方形）
            ctx.fillStyle = "#4CAF50";
            platforms.forEach(plat => {
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            });
        }

        function endGame(msg) {
            gameOver = true;
            alert(msg + " 最終得分: " + score + " 層");
            // 重新開始
            player.x = 200; player.y = 100; player.vy = 0;
            score = 0;
            document.getElementById("score-text").innerText = "層數: 0";
            gameOver = false;
            initPlatforms();
            requestAnimationFrame(update);
        }

        // 啟動遊戲
        initPlatforms();
        update();
    </script>

</body>
</html>
