<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛毛無聊落樓梯</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin-top: 20px;
        }
        canvas {
            background-color: #000;
            border: 4px solid #fff;
            display: block;
            margin: 20px auto;
        }
        p { font-size: 18px; color: #ccc; }
    </style>
</head>
<body>

    <h1>毛毛無聊落樓梯🐱</h1>
    <p>操控方法：用鍵盤 ⬅️ ➡️ 箭頭控制貓貓移動</p>
    <h2 id="score-text">層數: 0</h2>
    
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 1. 玩家設定 (配合貓貓形狀，將寬高改成 24 像素)
        let player = {
            x: 188, y: 50,
            width: 24, height: 24,
            vx: 0, vy: 0,
            speed: 5,
            gravity: 0.25,
            onPlatform: false,
            facing: "right" // 記住貓貓面向邊一邊
        };

        // 2. 樓梯設定
        let platforms = [];
        let platformSpeed = 1.0; 
        let score = 0;
        let gameOver = false;
        let animationFrameId = null;

        // 鍵盤狀態監聽
        let keys = { Left: false, Right: false };
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft" || e.key === "Left") {
                keys.Left = true;
                player.facing = "left"; // 向左行
            }
            if (e.key === "ArrowRight" || e.key === "Right") {
                keys.Right = true;
                player.facing = "right"; // 向右行
            }
        });
        window.addEventListener("keyup", e => {
            if (e.key === "ArrowLeft" || e.key === "Left") keys.Left = false;
            if (e.key === "ArrowRight" || e.key === "Right") keys.Right = false;
        });

        // 初始化樓梯
        function initPlatforms() {
            platforms = [];
            platforms.push({ x: 150, y: 150, width: 100, height: 15 });
            for (let i = 1; i < 6; i++) {
                generatePlatform(i * 85 + 150);
            }
        }

        function generatePlatform(yPosition) {
            let width = 80;
            let x = Math.random() * (canvas.width - width);
            platforms.push({ x: x, y: yPosition, width: width, height: 15 });
        }

        // 3. 核心遊戲引擎
        function update() {
            if (gameOver) return;

            if (keys.Left) player.vx = -player.speed;
            else if (keys.Right) player.vx = player.speed;
            else player.vx = 0;

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            player.onPlatform = false;
            platforms.forEach((plat, index) => {
                plat.y -= platformSpeed;

                let insideX = player.x + player.width > plat.x && player.x < plat.x + plat.width;
                if (insideX) {
                    if (player.y + player.height >= plat.y && player.y + player.height - player.vy <= plat.y + 8) {
                        player.y = plat.y - player.height;
                        player.vy = -platformSpeed; 
                        player.onPlatform = true;
                    }
                }

                if (plat.y + plat.height < 0) {
                    platforms.splice(index, 1);
                    generatePlatform(canvas.height);
                    score++;
                    document.getElementById("score-text").innerText = "層數: " + score;
                }
            });

            if (player.y <= 10) {
                endGame("夾死咗喇！😭");
                return;
            }
            if (player.y > canvas.height) {
                endGame("跌死咗喇！😭");
                return;
            }

            draw();
            animationFrameId = requestAnimationFrame(update);
        }

        // 5. 繪圖功能：喺度將藍色正方形換成黃色貓貓 🐱
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 天花板紅線針刺提示
            ctx.fillStyle = "red";
            ctx.fillRect(0, 0, canvas.width, 10);

            // ---- 開始畫貓貓 ----
            let centerX = player.x + player.width / 2;
            let centerY = player.y + player.height / 2;
            let radius = player.width / 2;

            // 畫左邊貓耳
            ctx.fillStyle = "#FFCA28"; // 貓貓鮮黃色
            ctx.beginPath();
            ctx.moveTo(centerX - radius, centerY - radius + 5);
            ctx.lineTo(centerX - radius - 2, centerY - radius - 6); // 耳尖
            ctx.lineTo(centerX - 2, centerY - radius + 2);
            ctx.fill();

            // 畫右邊貓耳
            ctx.beginPath();
            ctx.moveTo(centerX + radius, centerY - radius + 5);
            ctx.lineTo(centerX + radius + 2, centerY - radius - 6); // 耳尖
            ctx.lineTo(centerX + 2, centerY - radius + 2);
            ctx.fill();

            // 畫貓貓面部（大圓形）
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            // 畫貓貓眼睛（黑色）
            ctx.fillStyle = "#000000";
            let eyeOffsetX = player.facing === "left" ? -4 : 2; // 根據移動方向調整眼神
            
            // 左眼
            ctx.beginPath();
            ctx.arc(centerX - 4 + eyeOffsetX, centerY - 2, 2, 0, Math.PI * 2);
            ctx.fill();
            // 右眼
            ctx.beginPath();
            ctx.arc(centerX + 4 + eyeOffsetX, centerY - 2, 2, 0, Math.PI * 2);
            ctx.fill();

            // 畫貓貓細粉紅鼻
            ctx.fillStyle = "#FF8A80";
            ctx.beginPath();
            ctx.arc(centerX + (player.facing === "left" ? -2 : 1), centerY + 2, 1.5, 0, Math.PI * 2);
            ctx.fill();
            // ---- 貓貓畫完 ----

            // 畫樓梯（Blue長方形）
            ctx.fillStyle = "#2596be";
            platforms.forEach(plat => {
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            });
        }

        function endGame(msg) {
            gameOver = true;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            setTimeout(() => {
                alert(msg + " 最終得分: " + score + " 層");
                startGame();
            }, 10);
        }

        function startGame() {
            player.x = 188; 
            player.y = 50; 
            player.vy = 0;
            score = 0;
            player.facing = "right";
            document.getElementById("score-text").innerText = "層數: 0";
            keys.Left = false;
            keys.Right = false;
            
            gameOver = false;
            initPlatforms();
            update();
        }

        startGame();
    </script>

</body>
</html>
