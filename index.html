<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛毛無聊落樓梯</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin-top: 20px;
        }
        canvas {
            background-color: #000;
            border: 4px solid #fff;
            display: block;
            margin: 20px auto;
        }
        p { font-size: 18px; color: #ccc; }
    </style>
</head>
<body>

    <h1>毛毛無聊落樓梯</h1>
    <p>操控方法：用鍵盤 ⬅️ ➡️ 箭頭左右移動</p>
    <h2 id="score-text">層數: 0</h2>
    
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 1. 玩家設定
        let player = {
            x: 190, y: 50,
            width: 20, height: 20,
            vx: 0, vy: 0,
            speed: 5,
            gravity: 0.25,
            onPlatform: false
        };

        // 2. 樓梯設定
        let platforms = [];
        let platformSpeed = 1.0; 
        let score = 0;
        let gameOver = false;
        let animationFrameId = null; // 用嚟記住並清除舊嘅動畫迴圈

        // 鍵盤狀態監聽
        let keys = { Left: false, Right: false };
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft" || e.key === "Left") keys.Left = true;
            if (e.key === "ArrowRight" || e.key === "Right") keys.Right = true;
        });
        window.addEventListener("keyup", e => {
            if (e.key === "ArrowLeft" || e.key === "Left") keys.Left = false;
            if (e.key === "ArrowRight" || e.key === "Right") keys.Right = false;
        });

        // 初始化樓梯
        function initPlatforms() {
            platforms = [];
            platforms.push({ x: 150, y: 150, width: 100, height: 15 });
            for (let i = 1; i < 6; i++) {
                generatePlatform(i * 85 + 150);
            }
        }

        function generatePlatform(yPosition) {
            let width = 80;
            let x = Math.random() * (canvas.width - width);
            platforms.push({ x: x, y: yPosition, width: width, height: 15 });
        }

        // 3. 核心遊戲引擎
        function update() {
            if (gameOver) return;

            // 左右移動控制
            if (keys.Left) player.vx = -player.speed;
            else if (keys.Right) player.vx = player.speed;
            else player.vx = 0;

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            player.onPlatform = false;
            platforms.forEach((plat, index) => {
                plat.y -= platformSpeed;

                let insideX = player.x + player.width > plat.x && player.x < plat.x + plat.width;
                if (insideX) {
                    if (player.y + player.height >= plat.y && player.y + player.height - player.vy <= plat.y + 8) {
                        player.y = plat.y - player.height;
                        player.vy = -platformSpeed; 
                        player.onPlatform = true;
                    }
                }

                if (plat.y + plat.height < 0) {
                    platforms.splice(index, 1);
                    generatePlatform(canvas.height);
                    score++;
                    document.getElementById("score-text").innerText = "層數: " + score;
                }
            });

            // 4. 輸贏判定
            if (player.y <= 10) {
                endGame("你被夾死咗喇！");
                return;
            }
            if (player.y > canvas.height) {
                endGame("你跌死咗喇！");
                return;
            }

            draw();
            // 儲存當前迴圈嘅 ID
            animationFrameId = requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "red";
            ctx.fillRect(0, 0, canvas.width, 10);

            ctx.fillStyle = "#00bcff";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.fillStyle = "#4CAF50";
            platforms.forEach(plat => {
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            });
        }

        function endGame(msg) {
            gameOver = true;
            
            // 重要修正：徹底停低舊嘅遊戲動畫，防止越玩越快
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            // 用 setTimeout 延遲彈出，防止 alert 鎖死畫面導致控制鍵卡住
            setTimeout(() => {
                alert(msg + " 最終得分: " + score + " 層");
                startGame();
            }, 10);
        }

        function startGame() {
            player.x = 190; 
            player.y = 50; 
            player.vy = 0;
            score = 0;
            document.getElementById("score-text").innerText = "層數: 0";
            keys.Left = false;  // 重設按鍵狀態防止卡住
            keys.Right = false;
            
            gameOver = false;
            initPlatforms();
            update();
        }

        // 啟動遊戲
        startGame();
    </script>

</body>
</html>
