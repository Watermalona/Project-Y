<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小朋友落樓梯 修正流暢版</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin-top: 20px;
        }
        canvas {
            background-color: #000;
            border: 4px solid #fff;
            display: block;
            margin: 20px auto;
        }
        p { font-size: 18px; color: #ccc; }
    </style>
</head>
<body>

    <h1>小朋友落樓梯 (修正版)</h1>
    <p>操控方法：用鍵盤 ⬅️ ➡️ 箭頭左右移動</p>
    <h2 id="score-text">層數: 0</h2>
    
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 1. 玩家設定 (調低咗重力，加強咗操作反應)
        let player = {
            x: 190, y: 50,
            width: 20, height: 20,
            vx: 0, vy: 0,
            speed: 5,
            gravity: 0.25,
            onPlatform: false
        };

        // 2. 樓梯（平台）設定 (放慢咗上升速度)
        let platforms = [];
        let platformSpeed = 1.0; 
        let score = 0;
        let gameOver = false;

        // 鍵盤狀態監聽
        let keys = { Left: false, Right: false };
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft" || e.key === "Left") keys.Left = true;
            if (e.key === "ArrowRight" || e.key === "Right") keys.Right = true;
        });
        window.addEventListener("keyup", e => {
            if (e.key === "ArrowLeft" || e.key === "Left") keys.Left = false;
            if (e.key === "ArrowRight" || e.key === "Right") keys.Right = false;
        });

        // 初始化樓梯
        function initPlatforms() {
            platforms = [];
            // 喺正玩家下面放第一塊安全平台
            platforms.push({ x: 150, y: 150, width: 100, height: 15 });
            
            // 隨機生成其餘平台
            for (let i = 1; i < 6; i++) {
                generatePlatform(i * 85 + 150);
            }
        }

        function generatePlatform(yPosition) {
            let width = 80;
            let x = Math.random() * (canvas.width - width);
            platforms.push({ x: x, y: yPosition, width: width, height: 15 });
        }

        // 3. 核心遊戲引擎
        function update() {
            if (gameOver) return;

            // 左右移動控制
            if (keys.Left) player.vx = -player.speed;
            else if (keys.Right) player.vx = player.speed;
            else player.vx = 0;

            // 應用重力
            player.vy += player.gravity;

            // 更新玩家位置
            player.x += player.vx;
            player.y += player.vy;

            // 防止玩家走出左右邊界
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // 樓梯向上移動及「精準碰撞檢測」
            player.onPlatform = false;
            platforms.forEach((plat, index) => {
                plat.y -= platformSpeed;

                // 檢查左右是否有重疊 (X軸碰撞)
                let insideX = player.x + player.width > plat.x && player.x < plat.x + plat.width;
                
                // 檢查對腳係咪踩落樓梯表面 (Y軸頂部碰撞)
                if (insideX) {
                    if (player.y + player.height >= plat.y && player.y + player.height - player.vy <= plat.y + 8) {
                        player.y = plat.y - player.height;
                        player.vy = -platformSpeed; // 企定喺樓梯一齊上升
                        player.onPlatform = true;
                    }
                }

                // 如果樓梯升出頂部，就喺底補返一條新樓梯
                if (plat.y + plat.height < 0) {
                    platforms.splice(index, 1);
                    generatePlatform(canvas.height);
                    score++;
                    document.getElementById("score-text").innerText = "層數: " + score;
                }
            });

            // 4. 輸贏判定
            // 頂部針刺線
            if (player.y <= 10) {
                endGame("你被夾死咗喇！");
                return;
            }
            // 跌落深淵
            if (player.y > canvas.height) {
                endGame("你跌死咗喇！");
                return;
            }

            draw();
            requestAnimationFrame(update);
        }

        // 5. 繪圖功能
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 天花板紅線針刺提示
            ctx.fillStyle = "red";
            ctx.fillRect(0, 0, canvas.width, 10);

            // 畫玩家（藍色正方形）
            ctx.fillStyle = "#00bcff";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 畫樓梯（綠色長方形）
            ctx.fillStyle = "#4CAF50";
            platforms.forEach(plat => {
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            });
        }

        function endGame(msg) {
            gameOver = true;
            alert(msg + " 最終得分: " + score + " 層");
            
            // 重設所有數值
            player.x = 190; 
            player.y = 50; 
            player.vy = 0;
            score = 0;
            document.getElementById("score-text").innerText = "層數: 0";
            
            gameOver = false;
            initPlatforms();
            requestAnimationFrame(update);
        }

        // 啟動遊戲
        initPlatforms();
        update();
    </script>

</body>
</html>
